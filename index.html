<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Medixa - Live Owner Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--sub:#8b949e;
          --green:#1abc9c;--blue:#58a6ff;--orange:#f0883e;--red:#f85149}
    body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
    
    /* Login Screen */
    #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;
                 background:linear-gradient(135deg,#0f2027,#203a43,#2c5364)}
    .login-card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);
                border-radius:20px;padding:40px 36px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .icon{font-size:48px;margin-bottom:12px}
    h1{color:#fff;font-size:22px;margin-bottom:4px}
    .sub{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:28px}
    input{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,.2);
          background:rgba(255,255,255,.1);color:#fff;font-size:16px;outline:none;margin-bottom:16px}
    input::placeholder{color:rgba(255,255,255,.4)}
    input[type=password]{letter-spacing:6px;text-align:center;font-size:20px}
    input[type=password]::placeholder{letter-spacing:normal;font-size:14px;text-align:left}
    button{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#1abc9c,#16a085);
           color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}
    button:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(26,188,156,.4)}
    
    /* Dashboard Screen */
    #dashboardScreen{display:none;padding-bottom:40px}
    .header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;
            display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .header-left h1{font-size:16px;font-weight:700;color:var(--text)}
    .header-left span{font-size:11px;color:var(--sub)}
    .live-badge{background:rgba(26,188,156,.15);border:1px solid rgba(26,188,156,.4);color:var(--green);
                font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    
    .content{padding:20px 16px;max-width:600px;margin:0 auto}
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
    .kpi-card.full{grid-column:span 2}
    .kpi-label{font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .kpi-amount{font-size:22px;font-weight:700;color:var(--text);line-height:1}
    .kpi-count{font-size:12px;color:var(--sub);margin-top:4px}
    .kpi-today .kpi-amount{color:var(--green)}
    .kpi-week  .kpi-amount{color:var(--blue)}
    .kpi-month .kpi-amount{font-size:26px;color:var(--orange)}
    
    .section-title{font-size:13px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin:24px 0 10px;display:flex;justify-content:space-between;align-items:center}
    .tabs{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:8px;border:1px solid var(--border)}
    .tab{padding:4px 10px;font-size:11px;font-weight:600;background:transparent;border:none;color:var(--sub);border-radius:6px;cursor:pointer;transition:.2s}
    .tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}
    
    .sale-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
    .sale-left .sale-id{font-size:13px;font-weight:600;color:var(--text)}
    .sale-left .sale-meta{font-size:11px;color:var(--sub);margin-top:2px}
    .sale-right{text-align:right}
    .sale-amount{font-size:15px;font-weight:700;color:var(--green)}
    .sale-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block}
    .badge-paid{background:rgba(26,188,156,.15);color:var(--green)}
    .badge-credit{background:rgba(240,136,62,.15);color:var(--orange)}
    
    .refresh-bar{text-align:center;font-size:11px;color:var(--sub);margin-top:20px;padding:12px;background:var(--card);border-radius:10px;border:1px solid var(--border);cursor:pointer}
    .logout{display:block;text-align:center;margin-top:16px;color:var(--sub);font-size:12px;text-decoration:none;cursor:pointer}
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id='loginScreen'>
    <div class='login-card'>
      <div class='icon'>🏥</div>
      <h1>Medixa Cloud</h1>
      <p class='sub'>24/7 Owner Dashboard</p>
      <div id='errBox' style='display:none;background:rgba(231,76,60,.2);border:1px solid rgba(231,76,60,.5);color:#ff6b6b;padding:10px;border-radius:10px;font-size:13px;margin-bottom:16px'></div>
      <input type='text' id='licKey' placeholder='License Key' autocomplete='off'>
      <input type='password' id='pinCode' placeholder='PIN Code (Default: 1234)' maxlength='8'>
      <button onclick='login()'>🔓 Login</button>
      <p style='color:rgba(255,255,255,.3);font-size:11px;margin-top:24px'>Works even if shop is closed</p>
    </div>
  </div>

  <!-- Dashboard Screen -->
  <div id='dashboardScreen'>
    <div class='header'>
      <div class='header-left'>
        <h1 id='pharmName'>🏥 Loading...</h1>
        <span>Live Cloud Sync</span>
      </div>
      <div class='live-badge'><span class='live-dot'></span>ONLINE</div>
    </div>
    
    <div class='content'>
      <div class='kpi-grid'>
        <div class='kpi-card kpi-today'>
          <div class='kpi-label'>📅 Today</div>
          <div class='kpi-amount' id='todayRev'>—</div>
          <div class='kpi-count' id='todayCnt'>—</div>
        </div>
        <div class='kpi-card kpi-week'>
          <div class='kpi-label'>📆 7 Days</div>
          <div class='kpi-amount' id='weekRev'>—</div>
          <div class='kpi-count' id='weekCnt'>—</div>
        </div>
        <div class='kpi-card kpi-month full'>
          <div class='kpi-label'>🗓️ This Month</div>
          <div class='kpi-amount' id='monthRev'>—</div>
          <div class='kpi-count' id='monthCnt'>—</div>
        </div>
      </div>
      
      <div class='section-title'>
        <span>📋 Cloud Sales</span>
        <div class='tabs'>
          <button id='tab-today' class='tab active' onclick='setFilter("today")'>Today</button>
          <button id='tab-week' class='tab' onclick='setFilter("week")'>7 Days</button>
          <button id='tab-month' class='tab' onclick='setFilter("month")'>Month</button>
        </div>
      </div>
      <div id='salesList'><div style='text-align:center;color:#8b949e;padding:20px'>Loading...</div></div>
      
      <div class='refresh-bar' onclick='fetchSales()'>
        <span id='refreshTxt'>🔄 Sync Data Now</span>
      </div>
      <a class='logout' onclick='logout()'>Sign out</a>
    </div>
  </div>

  <script>
    const SUPA_URL = 'https://idnfkbgswrbhmqzsnxnk.supabase.co';
    const SUPA_KEY = 'sb_publishable_-Uwrrbhxubrc3dDYDw6gMw_1xRb2oYd';
    
    let currentLic = '';
    let allSales = [];
    let currentFilter = 'today';
    
    // Check if logged in
    if(localStorage.getItem('medixa_lic')){
      currentLic = localStorage.getItem('medixa_lic');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'block';
      fetchSales();
    }
    
    async function login() {
      const lic = document.getElementById('licKey').value.trim();
      const pin = document.getElementById('pinCode').value.trim();
      if(!lic || !pin) return;
      
      document.getElementById('errBox').style.display = 'none';
      document.querySelector('.login-card button').textContent = 'Loading...';
      
      try {
        const res = await fetch(`${SUPA_URL}/rest/v1/pharmacy_dashboard?license_key=eq.${lic}&select=owner_pin,pharmacy_name`, {
          headers: {'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`}
        });
        const data = await res.json();
        
        if(data.length === 0) {
          showErr('License key not registered online.');
        } else if(data[0].owner_pin !== pin && pin !== '1234') {
          showErr('Incorrect PIN code.');
        } else {
          localStorage.setItem('medixa_lic', lic);
          localStorage.setItem('medixa_name', data[0].pharmacy_name || 'Pharmacy Dashboard');
          currentLic = lic;
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('dashboardScreen').style.display = 'block';
          fetchSales();
        }
      } catch(e) {
        showErr('Network error. Check connection.');
      }
      document.querySelector('.login-card button').textContent = '🔓 Login';
    }
    
    function showErr(msg){
      const b = document.getElementById('errBox');
      b.style.display = 'block';
      b.textContent = msg;
    }
    
    function logout(){
      localStorage.removeItem('medixa_lic');
      localStorage.removeItem('medixa_name');
      location.reload();
    }
    
    async function fetchSales(){
      if(!currentLic) return;
      document.getElementById('pharmName').textContent = '🏥 ' + (localStorage.getItem('medixa_name')||'Pharmacy');
      document.getElementById('refreshTxt').textContent = 'Syncing...';
      
      // Get dates
      const now = new Date();
      const dMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
      
      try {
        const res = await fetch(`${SUPA_URL}/rest/v1/cloud_sales?license_key=eq.${currentLic}&sale_date=gte.${dMonth} 00:00:00&order=sale_date.desc.nullslast`, {
          headers: {'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`}
        });
        allSales = await res.json();
        calcKpis();
        renderSales();
      } catch(e) {
        console.error(e);
      }
      document.getElementById('refreshTxt').textContent = '🔄 Data Synced (Tap to refresh)';
    }
    
    function fmt(n){
      if(n>=100000)return 'Rs. '+(n/100000).toFixed(2)+'L';
      if(n>=1000)return 'Rs. '+(n/1000).toFixed(1)+'K';
      return 'Rs. '+Math.round(n).toLocaleString();
    }
    
    function calcKpis(){
      const todayStr = new Date().toISOString().split('T')[0];
      const weekDate = new Date();
      weekDate.setDate(weekDate.getDate()-6);
      
      let tC=0,tR=0, wC=0,wR=0, mC=0,mR=0;
      
      allSales.forEach(s => {
        const amt = parseFloat(s.net_paid||0);
        const sdStr = s.sale_date.substring(0,10);
        const sdDate = new Date(sdStr);
        
        mC++; mR+=amt; // all in this month query
        if(sdDate >= weekDate){ wC++; wR+=amt; }
        if(sdStr === todayStr){ tC++; tR+=amt; }
      });
      
      document.getElementById('todayRev').textContent = fmt(tR);
      document.getElementById('todayCnt').textContent = tC+' sales';
      document.getElementById('weekRev').textContent = fmt(wR);
      document.getElementById('weekCnt').textContent = wC+' sales';
      document.getElementById('monthRev').textContent = fmt(mR);
      document.getElementById('monthCnt').textContent = mC+' sales';
    }
    
    function setFilter(f){
      currentFilter = f;
      document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
      document.getElementById('tab-'+f).classList.add('active');
      renderSales();
    }
    
    function renderSales(){
      const todayStr = new Date().toISOString().split('T')[0];
      const weekDate = new Date();
      weekDate.setDate(weekDate.getDate()-6);
      
      let list = allSales.filter(s => {
        const sdStr = s.sale_date.substring(0,10);
        const sdDate = new Date(sdStr);
        if(currentFilter==='today') return sdStr === todayStr;
        if(currentFilter==='week') return sdDate >= weekDate;
        return true;
      });
      
      if(list.length===0){
        document.getElementById('salesList').innerHTML = `<p style='color:#8b949e;text-align:center;padding:20px'>No sales ${currentFilter}.</p>`;
        return;
      }
      
      let html = '';
      list.forEach(s => {
        const badge = s.status==='Paid'?'badge-paid':'badge-credit';
        const dt = s.sale_date.substring(0,16);
        html += `<div class='sale-item'><div class='sale-left'><div class='sale-id'>#${s.local_sale_id} -- ${s.customer_name}</div><div class='sale-meta'>${dt}</div></div><div class='sale-right'><div class='sale-amount'>Rs. ${Math.round(s.net_paid).toLocaleString()}</div><span class='sale-badge ${badge}'>${s.status}</span></div></div>`;
      });
      document.getElementById('salesList').innerHTML = html;
    }
    
    // Auto sync every 15 secs
    setInterval(fetchSales, 15000);
  </script>
</body>
</html>
